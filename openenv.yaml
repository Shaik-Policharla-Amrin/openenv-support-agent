name: openenv-support-agent
entrypoint: uvicorn inference:app --host 0.0.0.0 --port 7860

observation:
  type: object
  properties:
    ticket: string
    history: array

action:
  type: object
  properties:
    response: string

reward:
  type: object
  properties:
    score: float

tasks:
  - easy
  - medium
  - hard