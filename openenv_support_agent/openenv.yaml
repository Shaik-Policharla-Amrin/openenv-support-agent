name: openenv-support-agent

metadata:
  name: OpenEnv Support Agent
  description: Simple AI agent environment

compute:
  type: cpu

service:
  type: http
  endpoints:
    reset: /reset
    step: /step
    state: /state

tasks:
  - id: task1
    description: Say hello
    input: "hello"
    expected_output: "hello"

  - id: task2
    description: Explain AI
    input: "Explain AI"
    expected_output: "AI"

  - id: task3
    description: What is OpenEnv
    input: "What is OpenEnv"
    expected_output: "OpenEnv"